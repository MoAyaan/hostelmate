services:
  - type: web
    name: hostelmate-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 20

  - type: web
    name: hostelmate-web
    runtime: static
    rootDir: web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        fromService:
          type: web
          name: hostelmate-api
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
