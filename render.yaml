services:
  - type: web
    name: hostelmate-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 20

  - type: web
    name: hostelmate-web
    runtime: static
    rootDir: web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      # Proxy API calls through the same origin as the site itself, so the browser never makes
      # a cross-origin request to hostelmate-api.onrender.com (some networks block those).
      - type: rewrite
        source: /api/*
        destination: https://hostelmate-api.onrender.com/api/:splat
      - type: rewrite
        source: /*
        destination: /index.html
